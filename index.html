<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Романтический Клуб: Наследие</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">
        <div id="start-screen">
            <img src="materials/game_logo_final.png" alt="Логотип" class="logo">
            <div class="description">
                Приветствуем тебя в нашей игре…<br>
                Будь внимателен, милый.
            </div>
            <button class="start-button" id="main-button">Начать историю</button>
        </div>

        <div id="chapters-screen">
    <div class="description">Выберите главу</div>
    
     <div class="chapter-card" data-chapter="1">
        <div class="chapter-title">Глава 1: Алиса в общежитии</div>
        <div class="chapter-status">Доступно</div>
    </div>

    <div class="chapter-card locked" data-chapter="2">
        <div class="chapter-title">Глава 2: Знакомство с командой танцоров</div>
        <div class="chapter-status">После главы 1</div>
    </div>

    <div class="chapter-card locked" data-chapter="3">
        <div class="chapter-title">Глава 3: Знакомство с преподавателем</div>
        <div class="chapter-status">После главы 2</div>
    </div>
</div>
<div id="scene-screen" style="display: none;">
    <div class="scene-background" id="scene-bg"></div>
    <img id="main-character" class="scene-character" src="" alt="Персонаж">
    <div id="stat-toast" class="stat-toast"></div>

    <div class="dialogue-box">
        <div class="speaker-name" id="speaker-name"></div>  
        
        <div id="dialogue-text" class="dialogue-text"></div>
        
        <div id="choice-container" class="choice-container" style="display: none;"></div>
        
        <button id="prev-btn" class="prev-button">←</button>  
        <button id="next-btn" class="next-button">→</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
