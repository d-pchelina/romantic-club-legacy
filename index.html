<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Романтический Клуб: Наследие</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color); /* Используем цвета темы ТГ */
            color: var(--tg-theme-text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 10px 20px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 id="greeting">Загрузка...</h1>
    <p>Ваш прогресс будет сохранен локально.</p>
    <button id="main-button">Начать историю</button>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;

        // Сообщаем Telegram, что приложение готово
        tg.ready();

        // Расширяем приложение на все окно
        tg.expand();

        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;

        const greetingElement = document.getElementById('greeting');
        if (user) {
            greetingElement.innerText = `Привет, ${user.first_name}! 👋`;
        } else {
            greetingElement.innerText = "Привет, Игрок!";
        }

        // Пример работы с кнопкой
        document.getElementById('main-button').addEventListener('click', () => {
            tg.showAlert("История начинается! (Тут будет ваша 1-я глава)");
        });
    </script>
</body>
</html>
