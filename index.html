<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Романтический Клуб: Наследие</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: 
                radial-gradient(ellipse at 20% 15%, rgba(255, 240, 245, 0.9) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 80%, rgba(255, 182, 193, 0.7) 0%, transparent 55%),
                linear-gradient(135deg, #fff0f5 0%, #ffe4e9 50%, #ffd1dc 100%);
            font-family: 'Caveat', 'Great Vibes', cursive;
            color: #4a2c3f;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1529641484333-03811b992e4b?auto=format&fit=crop&q=60') center / 180% auto repeat;
            opacity: 0.07;
            pointer-events: none;
            mix-blend-mode: overlay;
            z-index: 0;
        }

        .scene {
            position: relative;
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 30px 0;
            z-index: 1;
        }

        .logo {
            display: block;
            margin: 0 auto 60px auto;
            max-width: 100%;
            width: 300px;
            height: auto;
            object-fit: contain;
            filter: 
                drop-shadow(0 10px 25px rgba(200, 80, 140, 0.28))
                brightness(1.03)
                contrast(1.08);
        }

        .description {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            line-height: 1.5;
            margin: 0 auto 80px;
            max-width: 360px;
            color: #5c2e45;
            text-shadow: 0 3px 14px rgba(255, 255, 255, 0.9), 0 1px 6px rgba(0,0,0,0.12);
            letter-spacing: 0.6px;
            font-weight: 400;
        }

        .start-button {
            position: relative;
            margin: 0 auto;
            width: 300px;
            height: 110px;
            background: linear-gradient(135deg, #ff9eca 0%, #ff74b8 45%, #ff4fa3 100%);
            border: 3px solid rgba(255, 245, 250, 0.75);
            border-radius: 60px / 50%;
            font-family: 'Great Vibes', cursive;
            font-size: 40px;
            font-weight: 300;
            color: #fffef5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 12px 36px rgba(255, 105, 180, 0.45),
                inset 0 2px 8px rgba(255,255,255,0.35);
            transition: all 0.32s ease;
            overflow: hidden;
            text-shadow: 0 2px 8px rgba(120, 20, 70, 0.6);
        }

        .start-button::before {
            content: "";
            position: absolute;
            top: -60%; left: -60%;
            width: 220%; height: 220%;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.55), transparent 45%);
            opacity: 0.8;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .start-button:hover {
            transform: scale(1.08) translateY(-10px);
            box-shadow: 
                0 22px 60px rgba(255, 80, 170, 0.65),
                inset 0 3px 12px rgba(255,255,255,0.4);
        }

        .start-button:hover::before {
            transform: translate(20%, 20%);
        }

        .start-button:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 0 6px 20px rgba(255, 80, 170, 0.5);
        }
    </style>
</head>
<body>
    <div class="scene">

        <img src="materials/game_logo_final.png" alt="Логотип" class="logo">

        <div class="description">
            Приветствуем тебя в нашей игре…<br>
            Будь внимателен, милый.<br>
            Пока что мы не сохраняем<br>
            твой путь в этой истории ♡
        </div>

        <button class="start-button" id="main-button">
            Начать историю
        </button>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('main-button').addEventListener('click', () => {
            tg.showAlert("История начинается… 💞");
            // → переход на следующую сцену
        });
    </script>
</body>
</html>
